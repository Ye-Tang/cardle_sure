name: cradle
channels:
  - pyg
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.4.0
  - pytorch-cuda=12.4
  - pyg=2.6.1=py310_torch_2.4.0_cu124
  - stable-baselines3>=2.0.0
  - gymnasium>=0.29.0
  - networkx>=3.0
  - pandas>=2.0.0
  - numpy>=1.24.0,<3
  - scipy>=1.10.0
  - matplotlib-base>=3.7.0
  - pyyaml>=6.0
  - tqdm>=4.65.0
  # PyTorch 2.4.0 may fail with MKL 2025 in conda environments
  # (`libtorch_cpu.so: undefined symbol: iJIT_NotifyEvent`).
  - mkl=2023.1.0
  - intel-openmp=2023.1.0
  - blas=1.0=mkl
variables:
  PYTHONNOUSERSITE: "1"
  PIP_NO_USER: "1"
